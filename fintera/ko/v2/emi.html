<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMI Calculator • Fintera</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    :root {
      --bg: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
      --surface: rgba(255, 255, 255, 0.05);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --border-focus: rgba(20, 184, 166, 0.4);
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: linear-gradient(135deg, #14b8a6, #06b6d4);
      --accent-hover: linear-gradient(135deg, #0d9488, #0891b2);
      --success: #22c55e;
      --info: #3b82f6;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      --shadow-lg: 0 35px 60px -12px rgba(0, 0, 0, 0.8);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 80%, rgba(20,184,166,.1) 0%, transparent 50%),radial-gradient(circle at 80% 20%, rgba(59,130,246,.1) 0%, transparent 50%),radial-gradient(circle at 40% 40%, rgba(34,197,94,.05) 0%, transparent 50%);z-index:-1;animation:bgShift 20s ease-in-out infinite}
    @keyframes bgShift{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    header{position:sticky;top:0;background:rgba(12,12,12,.8);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);padding:1rem 2rem;z-index:100}
    .header-content{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
    .logo{font-weight:800;font-size:1.5rem;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .back-link{color:var(--text-secondary);text-decoration:none;padding:.5rem 1rem;border-radius:50px;border:1px solid var(--border);background:var(--glass);transition:all .3s;backdrop-filter:blur(10px)}
    .back-link:hover{background:var(--surface-hover);transform:translateY(-2px);box-shadow:var(--shadow)}
    .container{max-width:1200px;margin:0 auto;padding:2rem}
    .hero{text-align:center;margin-bottom:3rem}
    .hero-title{font-size:3rem;font-weight:800;margin-bottom:1rem;background:linear-gradient(135deg,var(--text-primary),var(--text-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{font-size:1.2rem;color:var(--text-secondary);max-width:680px;margin:0 auto}
    .calc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2rem}
    .card{background:var(--glass);backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border);border-radius:24px;padding:2rem;box-shadow:var(--shadow);transition:all .3s}
    .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--border-focus)}
    .card-title{font-size:1.5rem;font-weight:700;margin-bottom:1.2rem;display:flex;gap:.5rem;align-items:center}
    .group{margin-bottom:1.2rem}
    .label{display:block;font-size:.9rem;font-weight:500;color:var(--text-secondary);margin-bottom:.5rem}
    .field{width:100%;padding:1rem 1.2rem;border:1px solid var(--border);border-radius:16px;background:var(--surface);color:var(--text-primary);transition:all .3s}
    .field:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 4px rgba(20,184,166,.1);transform:scale(1.02)}
    .btns{display:flex;gap:1rem;margin-top:1.2rem}
    .btn{padding:1rem 2rem;border:none;border-radius:16px;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:.5px}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
    .btn-primary:hover{background:var(--accent-hover);transform:translateY(-3px) scale(1.05);box-shadow:var(--shadow-lg)}
    .btn-secondary{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border)}
    .btn-secondary:hover{background:var(--surface-hover);transform:translateY(-2px)}
    .result-display{text-align:center;padding:2rem;border-radius:20px;background:linear-gradient(135deg,var(--surface),var(--glass));border:1px solid var(--border);margin-bottom:1.5rem}
    .res-label{font-size:1rem;color:var(--text-secondary);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:1px}
    .res-value{font-size:3rem;font-weight:800;background:linear-gradient(135deg,#22d3ee,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
    .stat{padding:1.2rem;text-align:center;background:var(--glass);border:1px solid var(--border);border-radius:16px}
    .stat-val{font-size:1.4rem;font-weight:700}
    .stat-lbl{font-size:.9rem;color:var(--text-muted);margin-top:.35rem}
    .viz{background:var(--glass);backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border);border-radius:24px;padding:2rem;box-shadow:var(--shadow)}
    .viz-title{font-size:1.2rem;font-weight:600;margin-bottom:1rem;color:var(--text-secondary)}
    .bar-area{display:flex;gap:10px;align-items:flex-end;justify-content:center;height:200px;padding:1rem;background:var(--surface);border-radius:16px}
    .bar-col{display:flex;flex-direction:column;align-items:center;gap:.5rem}
    .bar-stack{display:flex;flex-direction:column;justify-content:flex-end;height:160px}
    .b-principal{width:24px;background:#22d3ee;border-radius:4px 4px 0 0}
    .b-interest{width:24px;background:#10b981;border-radius:0 0 4px 4px}
    .bar-lbl{font-size:.8rem;color:var(--text-muted)}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:16px;overflow:hidden}
    th,td{padding:1rem;text-align:left;border-bottom:1px solid var(--border)}
    th{background:var(--glass);font-weight:600;color:var(--text-secondary);text-transform:uppercase;font-size:.9rem;letter-spacing:.5px}
    .container.narrow{max-width:1000px}
    @media (max-width: 900px){.calc-wrap{grid-template-columns:1fr}.container{padding:1rem}}
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">Fintera</div>
      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </header>
  <main class="container narrow">
    <section class="hero">
      <h1 class="hero-title">EMI Calculator</h1>
      <p class="hero-sub">Compute monthly EMI and visualize principal vs interest over the years.</p>
    </section>
    <div class="calc-wrap">
      <div class="card">
        <h2 class="card-title">🧮 Loan Parameters</h2>
        <div class="group"><label class="label">Loan Amount (₹)</label><input id="amount" type="number" class="field" value="300000"></div>
        <div class="group"><label class="label">Annual Interest (%)</label><input id="rate" type="number" step="0.1" class="field" value="9.5"></div>
        <div class="group"><label class="label">Tenure (Years)</label><input id="years" type="number" class="field" value="15"></div>
        <div class="btns"><button class="btn btn-primary" onclick="calc()">Calculate</button><button class="btn btn-secondary" onclick="prefill()">Reset</button></div>
      </div>
      <div class="card">
        <h2 class="card-title">📊 Results</h2>
        <div class="result-display"><div class="res-label">EMI / Month</div><div id="emi" class="res-value">—</div></div>
        <div class="stats">
          <div class="stat"><div id="totalPay" class="stat-val">—</div><div class="stat-lbl">Total Payment</div></div>
          <div class="stat"><div id="totalInt" class="stat-val">—</div><div class="stat-lbl">Total Interest</div></div>
          <div class="stat"><div id="tenure" class="stat-val">—</div><div class="stat-lbl">Tenure</div></div>
        </div>
      </div>
    </div>
    <section class="viz">
      <div class="viz-title">Yearly Principal vs Interest</div>
      <div id="chart" class="bar-area"></div>
      <div class="table-wrap" style="margin-top:1rem">
        <table id="table"></table>
      </div>
    </section>
  </main>
  <script>
    function money(v){ return '₹ ' + Number(v).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
    function prefill(){ document.getElementById('amount').value=300000; document.getElementById('rate').value=9.5; document.getElementById('years').value=15; calc(); }
    function calc(){
      const P=+document.getElementById('amount').value; const r=(+document.getElementById('rate').value)/1200; const n=(+document.getElementById('years').value)*12;
      if(!(P>0&&n>0)){ document.getElementById('emi').textContent='—'; return; }
      const m = r? P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1) : P/n; document.getElementById('emi').textContent = money(m);
      let balance=P; let totInt=0; const pts=[]; const yrs=Math.ceil(n/12);
      for(let y=1;y<=yrs;y++){ let ip=0, pp=0; for(let i=0;i<12 && (y-1)*12+i<n;i++){ const interest=balance*r; const principal=m-interest; balance-=principal; ip+=interest; pp+=principal; } totInt+=ip; pts.push({y, principal: Math.max(pp,0), interest: Math.max(ip,0), balance: Math.max(balance,0)}); }
      document.getElementById('totalPay').textContent = money(P+totInt);
      document.getElementById('totalInt').textContent = money(totInt);
      document.getElementById('tenure').textContent = (n/12).toFixed(1)+ ' yrs';
      renderBars(pts); renderTable(pts);
    }
    function renderBars(pts){
      const max=Math.max(...pts.map(p=>p.principal+p.interest),1); const area=document.getElementById('chart');
      area.innerHTML = pts.map(p=>{ const total=p.principal+p.interest; const H=160; const hp=Math.max(4,Math.round((p.principal/total)*H)); const hi=Math.max(4,H-hp); return `<div class="bar-col"><div class="bar-stack"><div class="b-interest" style="height:${hi}px"></div><div class="b-principal" style="height:${hp}px"></div></div><div class="bar-lbl">Y${p.y}</div></div>`; }).join('');
    }
    function renderTable(pts){
      const rows = pts.map(p=>`<tr><td>Year ${p.y}</td><td>${money(p.principal)}</td><td>${money(p.interest)}</td><td>${money(p.balance)}</td></tr>`).join('');
      document.getElementById('table').innerHTML = `<thead><tr><th>Year</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead><tbody>${rows}</tbody>`;
    }
    calc();
  </script>
</body>
</html>
